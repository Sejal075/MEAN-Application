name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend

    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend
